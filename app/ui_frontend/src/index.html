<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dexterity UI</title>
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <link rel="stylesheet" href="./styles.css">
</head>
  <body class="bg-neutral-900" >

    <div class="grid grid-cols-4 gap-0 ">

      <!-- Tasks -->
      <div class="flex flex-col h-full bg-neutral-900 text-white p-8">
        <h1 class="text-3xl py-2 font-semibold"> Tasks</h1>

        <!-- Task History -->
        <label id="task_history_label" class="mb-2.5 font-medium hidden text-neutral-400 uppercase text-xs tracking-widest">History</label>
        <div id="task_history" class="mb-6 max-h-96 overflow-y-auto"></div>

        <!-- Task Input -->
        <div id="task_input_div" class="mt-auto">
          <label class="mb-2.5 font-medium text-white">What do you want the robots to do next?</label>
          <textarea id="task_input" rows="3" class="border border-neutral-700 rounded w-full p-2 shadow-xs bg-neutral-800 text-white placeholder:text-neutral-500 mt-1"
            placeholder="Write your task or revision here..."></textarea>

          <button id="submit_task" type="button" class="w-full mt-2 text-white bg-neutral-600 hover:bg-neutral-500 border border-transparent rounded shadow-md px-2 py-2 font-medium">Submit</button>
          <div id="loading_spinner" class="mt-2 hidden animate-spin  place-items-center">
            <img src="assets/svgs/spinner.svg" alt="Loading spinner" width="40" />
          </div> 
        </div>

      </div>

      <!-- Isaacsim -->
      <div class="col-span-3 relative">

        <video id="remote-video" autoplay playsinline muted
                style="width:100vw; object-fit:contain; display:block"></video>
        <audio id="remote-audio" autoplay></audio>
        
        
        <div class="absolute top-8 right-8 flex gap-2">
          <!-- Reset objects -->
          <button id="reset_objects" class="px-3 py-2 bg-teal-600 hover:bg-teal-700 text-white text-xl font-medium rounded-full shadow-lg">
            <img id="reset_img" src="/src/assets/svgs/reload.svg" alt="Reset objects button" width="25" />
          </button>

          <!-- Toggle object tracking with vision -->
          <button id="freeze_scene" class="px-3 py-2 bg-teal-600 hover:bg-teal-700 text-white text-xl font-medium rounded-full shadow-lg">
            Track Scene
          </button>
        </div>
      </div>

      <!-- Timeline Elements -->
      <div class="flex items-center items-start col-span-4 p-8 bg-neutral-900 border-y-2 border-neutral-700">
        <div class="flex items-center h-30 m-2">
          <div id="play" class="flex justify-center flex-shrink-0 bg-neutral-600 hover:bg-neutral-500 rounded-full w-14 h-14 ">
            <img id="play_img" src="/src/assets/svgs/play.svg" alt="Play Button" width="25" />
          </div>
        </div>

        <div id="timeline_viewport" class="flex overflow-x-auto relative flex-1 min-w-0">

          <!-- Timeline -->
          <div id="timeline" class="flex whitespace-nowrap min-w-0 items-start"></div>
        </div>
      
        <div class="flex items-center h-30 mx-1 my-2">
          <button id="add_primitive" class="w-12 text-5xl items-center bg-neutral-600 hover:bg-neutral-500 text-white rounded-full font-medium ">
            +
          </button>
        </div>

        <div class="flex items-center h-30 ml-6 my-2">
          <button id="execute_on_robot" class="w-36 p-2 items-center bg-yellow-400 hover:bg-yellow-500 text-black text-center rounded-full text-xl font-medium ">
            Execute on Robot
          </button>
        </div>


        


      </div>

      <!-- PopUp Primitive Editor (Mostly generated by GPT)-->
      <div id="primitive_modal" class="flex items-center justify-start pl-4 hidden fixed inset-0 z-50">
        <div class="bg-neutral-800 text-white p-4 rounded-xl w-96 border border-neutral-600 shadow-lg">
    
          <!-- Filled in with javascript -->
          <div id="primitive_modal_content"></div>

          <!-- BUTTONS -->
          <div class="flex justify-between mt-4">
            <!-- TODO -->
            <button id="delete_primitive" class="w-16 py-1 bg-red-900 text-white rounded shadow-md">
              Delete
            </button>

            <div class="flex gap-2">
              <button id="cancel_edit" class="w-16 py-1 hover:bg-neutral-700 rounded">Cancel</button>
              <button id="save_edit" class="w-16 py-1 bg-black hover:bg-neutral-700 text-white rounded shadow-md">Save</button>
            </div>
          </div>
        </div>
      </div>


        <!-- PopUp Primitive Adder-->
      <div id="add_primitive_modal" class="flex items-center justify-end pr-4 hidden fixed inset-0 z-50">
        <div class="bg-neutral-800 text-white p-4 rounded-xl w-96 border border-neutral-600 shadow-lg">
          <div class="text-2xl font-bold mb-4"> Add Primitive</div>
          <!-- Filled in with javascript -->
          <div id="add_primitive_modal_content"></div>

          <!-- BUTTONS -->
          <div class="flex justify-end mt-4">

            <div class="flex gap-2">
              <button id="cancel_add" class="w-16 py-1 hover:bg-neutral-700 rounded">Cancel</button>
              <button id="save_add" class="w-16 py-1 bg-black hover:bg-neutral-700 text-white rounded shadow-md">Add</button>
            </div>
          </div>
        </div>
      </div>

    


    <script type="module" src="./js/index.js"></script>
  </body>
</html>
